name: Venom Self-Audit

# Dogfooding: run Venom against its own repository. Non-gating (fail-on-policy
# false) because Venom's dev dependencies carry known advisories we track openly;
# the point is to surface them in the Security tab and PR comments.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  self-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Venom on itself
        uses: ./action
        with:
          fail-on-policy: 'false'
